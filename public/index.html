<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unicorn TV - Premium Streaming Player</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="Unicorn TV favicon-192x192.png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Boxicons for icons -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <!-- Left Sidebar: Channel List view is active by default -->
        <aside class="sidebar view-channels" id="sidebar-panel">
            <div class="sidebar-header">
                <div class="logo-area">
                    <i class='bx bx-play-circle logo-icon'></i>
                    <span class="logo-text">Unicorn <span class="logo-highlight">TV</span></span>
                </div>
            </div>

            <!-- Unified Search Bar -->
            <div class="sidebar-search-box">
                <i class='bx bx-search search-icon'></i>
                <input type="text" id="channel-search" placeholder="Search channels...">
                <button class="sidebar-search-clear" id="search-clear"><i class='bx bx-x'></i></button>
            </div>

            <!-- Menu Items -->
            <div class="sidebar-menu">
                <button class="menu-item active" id="btn-all-channels" data-type="all">
                    <i class='bx bx-grid-alt'></i>
                    <span>All Channels</span>
                </button>
                <button class="menu-item" id="btn-favorites" data-type="favorites">
                    <i class='bx bxs-heart favorite-color'></i>
                    <span>Favorites</span>
                    <span class="badge" id="fav-count">0</span>
                </button>
            </div>

            <!-- Category Filter (collapsible) -->
            <div class="category-section">
                <div class="category-section-header">
                    <h3 class="category-header">Categories</h3>
                    <div class="category-search-box">
                        <i class='bx bx-filter search-icon'></i>
                        <input type="text" id="group-search" placeholder="Filter...">
                    </div>
                </div>
                <div class="category-list" id="categories-container">
                    <div class="skeleton-category"></div>
                    <div class="skeleton-category"></div>
                    <div class="skeleton-category"></div>
                </div>
            </div>

            <!-- Channel List (scrollable) -->
            <div class="sidebar-channel-list">
                <div class="channel-list-header">
                    <span class="channel-list-title" id="active-category-title">All Channels</span>
                    <span class="channel-list-count" id="results-count">0</span>
                </div>
                <div class="channel-list-scroll" id="channel-grid-container">
                    <!-- Skeleton Cards -->
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                </div>
            </div>
        </aside>

        <!-- Main Content: Video Player Only -->
        <main class="main-content">
            <div class="player-fullarea">
                <div class="video-wrapper" id="video-wrapper">
                    <video id="video-player" playsinline autoplay></video>

                    <!-- Center Play/Pause Flash Overlay -->
                    <div class="center-play-btn" id="center-play-btn">
                        <i class='bx bx-play'></i>
                    </div>

                    <!-- Now Playing Info Bar (overlaid on video top) -->
                    <div class="now-playing-bar" id="now-playing-bar">
                        <div class="npb-left">
                            <h2 class="npb-title" id="now-playing-title">Select a Channel</h2>
                            <div class="npb-details">
                                <span class="badge badge-group" id="now-playing-group">—</span>
                                <span class="badge badge-engine" id="now-playing-engine">—</span>
                            </div>
                        </div>
                        <div class="npb-right">
                            <!-- EPG (only shown when real data exists) -->
                            <div class="epg-timeline-container" id="epg-timeline-container" style="display: none;">
                                <div class="epg-program now-playing-program">
                                    <span class="epg-label">ON NOW</span>
                                    <div class="epg-program-details">
                                        <span class="epg-title" id="epg-now-title">Current Program</span>
                                        <span class="epg-time" id="epg-now-time">—</span>
                                    </div>
                                    <div class="epg-progress-bar">
                                        <div class="epg-progress-fill" id="epg-now-progress" style="width: 0%;"></div>
                                    </div>
                                </div>
                                <div class="epg-program next-program">
                                    <span class="epg-label">NEXT</span>
                                    <div class="epg-program-details">
                                        <span class="epg-title" id="epg-next-title">Next Program</span>
                                        <span class="epg-time" id="epg-next-time">—</span>
                                    </div>
                                </div>
                            </div>
                            <button class="action-btn fav-toggle-btn" id="now-playing-fav-btn" title="Add to Favorites">
                                <i class='bx bx-heart'></i>
                            </button>
                        </div>
                    </div>

                    <!-- Custom Controls Overlay -->
                    <div class="video-controls-container" id="video-controls-container">
                        <div class="controls-gradient-bg"></div>
                        <div class="controls-row">
                            <div class="controls-left">
                                <button class="control-btn" id="ctrl-play-pause" title="Play/Pause (Space)">
                                    <i class='bx bx-play'></i>
                                </button>
                                <div class="volume-container">
                                    <button class="control-btn" id="ctrl-volume" title="Mute/Unmute (M)">
                                        <i class='bx bx-volume-full'></i>
                                    </button>
                                    <input type="range" class="volume-slider" id="ctrl-volume-slider" min="0" max="1"
                                        step="0.05" value="1">
                                </div>
                                <div class="live-indicator">
                                    <span class="live-dot"></span>
                                    <span class="live-text">LIVE</span>
                                </div>
                            </div>
                            <div class="controls-right">
                                <button class="control-btn btn-badge" id="ctrl-data-saver" title="Data Saver Mode">
                                    <i class='bx bx-shield-quarter'></i>
                                    <span class="btn-label">Data Saver Off</span>
                                </button>
                                <button class="control-btn" id="ctrl-settings" title="Quality Settings">
                                    <i class='bx bx-cog'></i>
                                </button>
                                <button class="control-btn" id="ctrl-fullscreen" title="Fullscreen (F)">
                                    <i class='bx bx-fullscreen'></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Quality Settings Menu Popup -->
                    <div class="player-settings-popup" id="player-settings-popup">
                        <div class="popup-title"><i class='bx bx-cog'></i> Stream Quality</div>
                        <div class="options-list" id="quality-options-list">
                            <button class="option-item active" data-level="-1">Auto</button>
                        </div>
                    </div>

                    <!-- Overlays: Welcome / Loading / Error -->
                    <div class="player-overlay" id="player-overlay">
                        <div class="loader" id="player-loader">
                            <div class="spinner"></div>
                            <span class="loader-text">Initializing stream...</span>
                        </div>
                        <div class="player-error" id="player-error">
                            <i class='bx bx-error-circle error-icon'></i>
                            <span class="error-title">Stream Playback Failed</span>
                            <span class="error-msg" id="player-error-msg">The stream format is unsupported or
                                offline.</span>
                            <button class="retry-btn" id="player-retry"><i class='bx bx-refresh'></i> Retry</button>
                        </div>
                        <div class="player-welcome" id="player-welcome">
                            <i class='bx bx-tv welcome-icon'></i>
                            <span class="welcome-title">Select a Channel</span>
                            <span class="welcome-subtitle">Choose from the sidebar to start watching</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Invisible elements kept for JS compatibility -->
    <span id="total-channel-count" style="display:none;">0</span>
    <span id="now-playing-url" style="display:none;"></span>

    <!-- Media Players CDN Scripts -->
    <!-- Hls.js for .m3u8 and .php -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.8/hls.min.js"></script>
    <!-- Dash.js for .mpd -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dashjs/4.7.4/dash.all.min.js"></script>
    <!-- Mpegts.js for .ts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mpegts.js/1.7.3/mpegts.min.js"></script>

    <!-- Application Logic -->
    <script src="app.js"></script>
</body>

</html>
